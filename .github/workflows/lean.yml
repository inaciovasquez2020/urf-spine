name: Lean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean
        run: |
          lean --version
          lake --version

      - name: Generate manifest
        run: lake update

      - name: Get mathlib cache
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: "Guard: forbid List.sort i"n spine/lean
        run: |
          if [ -d spine/lean ] && grep -R --line-number "List.sort" spine/lean; then
            echo "ERROR: List.sort is forbidden"
            exit 1
          fi
