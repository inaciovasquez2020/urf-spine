
      - name: Run extractor
        run: python tools/extract_invariants.py

      - name: Verify signature
        run: python tools/verify_signature.py

      - name: Generate export
        run: python tools/extract_invariants.py > output.json

      - name: Verify pipeline
        run: python tools/verify_signature.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: urf-spine-export
          path: output.json

      - name: Fail on empty export
        run: |
          python tools/extract_invariants.py > output.json
          test -s output.json

      - name: Validate batch schema
        run: |
          python tools/batch_extract.py
          test -s batch_output.json

      - name: Benchmark
        run: |
          python tools/benchmark.py
          test -s benchmark.txt

      - name: Memory check
        run: |
          python tools/profile_memory.py
          test -s memory.txt
